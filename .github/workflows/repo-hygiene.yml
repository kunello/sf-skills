name: Repo Hygiene

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  hygiene:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run repository hygiene checks
        run: python3 tools/check_repo_hygiene.py
